<!--
  Drop-in reference: BUG REPORTS TAB for the replanish.app/admin dashboard.

  This is a complete, self-contained HTML page demonstrating the tab pattern
  + bug-reports rendering + status updates. Lift the JS + CSS into your
  existing admin dashboard codebase (likely Next.js/Astro/static HTML on
  replanish.app), or paste this whole file as a starter.

  Backend it consumes: admin-ai-stats edge fn at v2.0.0+ (the multi-op API).
  See supabase/functions/admin-ai-stats/index.ts for ops.

  Usage:
    1. Edit ENDPOINT below to your Supabase project URL.
    2. Paste your ADMIN_DASHBOARD_PASSWORD when prompted (it's stored in
       sessionStorage so reloads keep working but a tab close clears it —
       intentional, so a stolen laptop doesn't auto-grant access).
    3. Tab auto-loads "Bug reports" by default; switch tabs to see AI usage.

  Pattern for new tabs (e.g. "Subscriptions" later):
    1. Add an op in admin-ai-stats/index.ts (e.g. ?op=subscriptions).
    2. Add a <button class="tab-btn" data-tab="subs"> here.
    3. Add a <section id="tab-subs"> with the rendering code.
-->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Replanish — Admin</title>
<style>
  :root {
    --bg: #faf6ef;
    --ink: #2a2520;
    --ink-mute: #6f655c;
    --line: #e8dfd2;
    --card: #ffffff;
    --brand: #c4522d;
    --brand-deep: #a83f1d;
    --crash: #c4522d;
    --bug: #d97706;
    --feedback: #1d4ed8;
    --resolved: #047857;
    --open: #d97706;
    --dismissed: #6f655c;
    --investigating: #7c3aed;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--line);
    background: rgba(250, 246, 239, 0.95);
    backdrop-filter: blur(6px);
    position: sticky; top: 0; z-index: 10;
  }
  header h1 {
    margin: 0;
    font-family: "Instrument Serif", Georgia, serif;
    font-style: italic;
    font-weight: 400;
    font-size: 28px;
    color: var(--ink);
  }
  main { max-width: 1200px; margin: 0 auto; padding: 24px; }

  .tab-bar {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    border-bottom: 1px solid var(--line);
  }
  .tab-btn {
    background: none;
    border: none;
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink-mute);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s ease;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .tab-btn:hover { color: var(--ink); }
  .tab-btn.active {
    color: var(--brand);
    border-bottom-color: var(--brand);
  }
  .tab-btn .badge {
    background: var(--brand);
    color: white;
    border-radius: 999px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 600;
    min-width: 20px;
    text-align: center;
  }

  section.tab { display: none; }
  section.tab.active { display: block; }

  .filter-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-bar label { font-size: 12px; color: var(--ink-mute); font-weight: 500; }
  .filter-bar select {
    padding: 6px 10px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: white;
    font: inherit;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .card-header {
    padding: 12px 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .card-header:hover { background: rgba(196, 82, 45, 0.04); }
  .card-body {
    padding: 12px 16px;
    border-top: 1px solid var(--line);
    background: var(--bg);
    font-size: 12px;
    display: none;
  }
  .card.expanded .card-body { display: block; }

  .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 600;
    border: 1px solid;
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }
  .pill-crash         { color: var(--crash); border-color: var(--crash); background: rgba(196, 82, 45, 0.1); }
  .pill-bug           { color: var(--bug); border-color: var(--bug); background: rgba(217, 119, 6, 0.1); }
  .pill-feedback      { color: var(--feedback); border-color: var(--feedback); background: rgba(29, 78, 216, 0.1); }
  .pill-open          { color: var(--open); border-color: var(--open); background: rgba(217, 119, 6, 0.1); }
  .pill-investigating { color: var(--investigating); border-color: var(--investigating); background: rgba(124, 58, 237, 0.1); }
  .pill-resolved      { color: var(--resolved); border-color: var(--resolved); background: rgba(4, 120, 87, 0.1); }
  .pill-dismissed     { color: var(--dismissed); border-color: var(--dismissed); background: rgba(111, 101, 92, 0.1); }

  .meta { font-size: 11px; color: var(--ink-mute); }
  .msg-line { color: var(--ink); margin-top: 2px; }
  pre {
    background: var(--card);
    padding: 10px;
    border-radius: 6px;
    border: 1px solid var(--line);
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-word;
    margin: 6px 0 12px 0;
    font-size: 11px;
    line-height: 1.5;
  }
  .row-actions { display: flex; gap: 8px; flex-wrap: wrap; padding-top: 8px; }
  .row-actions select, .row-actions button {
    padding: 4px 10px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: white;
    font-size: 12px;
    cursor: pointer;
  }
  .row-actions button:hover { background: var(--bg); }
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-mute);
  }

  .ai-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 24px;
  }
  .ai-num { font-size: 32px; font-weight: 600; color: var(--ink); }
  .ai-label { font-size: 12px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.04em; }
</style>
</head>
<body>
<header>
  <h1>Replanish — Admin</h1>
</header>
<main>

  <div class="tab-bar" id="tabBar">
    <button class="tab-btn active" data-tab="bugs">
      Bug reports <span class="badge" id="badgeBugs" style="display:none">0</span>
    </button>
    <button class="tab-btn" data-tab="ai">AI usage</button>
    <!-- Add more tabs here as new ops ship in admin-ai-stats. -->
  </div>

  <!-- Bug reports tab -->
  <section class="tab active" id="tab-bugs">
    <div class="filter-bar">
      <label>Status
        <select id="filterStatus">
          <option value="open" selected>open</option>
          <option value="investigating">investigating</option>
          <option value="resolved">resolved</option>
          <option value="dismissed">dismissed</option>
          <option value="all">all</option>
        </select>
      </label>
      <label>Severity
        <select id="filterSeverity">
          <option value="all" selected>all</option>
          <option value="crash">crash</option>
          <option value="bug">bug</option>
          <option value="feedback">feedback</option>
        </select>
      </label>
      <button onclick="loadBugReports()" style="padding:6px 12px;border:1px solid var(--line);border-radius:6px;background:white;cursor:pointer">↻ Refresh</button>
      <span class="meta" id="bugsMeta" style="margin-left:auto"></span>
    </div>
    <div id="bugsList"><div class="empty">Loading…</div></div>
  </section>

  <!-- AI usage tab -->
  <section class="tab" id="tab-ai">
    <div id="aiContent" class="ai-card"><div class="empty">Loading…</div></div>
  </section>

</main>

<script>
// ─── Configure for your project ────────────────────────────────────────────
const ENDPOINT = 'https://zgebzhvbszhqvaryfiwk.supabase.co/functions/v1/admin-ai-stats'

// Prompt for password on first load; persist for the session.
function getPassword() {
  let pw = sessionStorage.getItem('admin_pw')
  if (!pw) {
    pw = prompt('Admin password:') ?? ''
    if (pw) sessionStorage.setItem('admin_pw', pw)
  }
  return pw
}

async function callApi(opts) {
  const { op, method = 'GET', params = {}, body } = opts
  const url = new URL(ENDPOINT)
  url.searchParams.set('op', op)
  for (const [k, v] of Object.entries(params)) {
    if (v != null) url.searchParams.set(k, String(v))
  }
  const res = await fetch(url, {
    method,
    headers: {
      'Content-Type': 'application/json',
      'x-admin-password': getPassword(),
    },
    body: body ? JSON.stringify(body) : undefined,
  })
  if (res.status === 401) {
    sessionStorage.removeItem('admin_pw')
    alert('Wrong password — try again.')
    location.reload()
    throw new Error('unauthorized')
  }
  if (!res.ok) {
    const text = await res.text().catch(() => '')
    throw new Error(`${op} failed: HTTP ${res.status} ${text}`)
  }
  return res.json()
}

// ─── Tab switching ─────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach((btn) => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab
    document.querySelectorAll('.tab-btn').forEach((b) => b.classList.toggle('active', b === btn))
    document.querySelectorAll('section.tab').forEach((s) => s.classList.toggle('active', s.id === `tab-${tab}`))
    if (tab === 'ai' && !window.__aiLoaded) {
      loadAIUsage()
      window.__aiLoaded = true
    }
  })
})

// ─── Summary (drives tab badges) ───────────────────────────────────────────
async function loadSummary() {
  try {
    const data = await callApi({ op: 'summary' })
    const open = data?.bugs?.open ?? 0
    const badge = document.getElementById('badgeBugs')
    if (open > 0) {
      badge.textContent = String(open)
      badge.style.display = 'inline-block'
    }
  } catch (err) { console.error(err) }
}

// ─── Bug reports ───────────────────────────────────────────────────────────
async function loadBugReports() {
  const status   = document.getElementById('filterStatus').value
  const severity = document.getElementById('filterSeverity').value
  const list     = document.getElementById('bugsList')
  list.innerHTML = '<div class="empty">Loading…</div>'
  try {
    const data = await callApi({ op: 'bug-reports', params: { status, severity, limit: 100 } })
    document.getElementById('bugsMeta').textContent = `${data.count} report${data.count === 1 ? '' : 's'}`
    if (!data.reports?.length) {
      list.innerHTML = `<div class="empty">No reports match these filters. ${status === 'open' && severity === 'all' ? '🎉' : ''}</div>`
      return
    }
    list.innerHTML = data.reports.map(renderReport).join('')
  } catch (err) {
    list.innerHTML = `<div class="empty" style="color:var(--crash)">Error: ${err.message}</div>`
  }
}

function renderReport(r) {
  const safe = (s) => String(s ?? '').replace(/[<>&"]/g, (c) => ({ '<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;' }[c]))
  const ts = new Date(r.created_at).toLocaleString()
  const summary = (r.message ?? '').split('\n')[0].slice(0, 200)
  return `
    <div class="card" data-id="${safe(r.id)}">
      <div class="card-header" onclick="this.parentNode.classList.toggle('expanded')">
        <div style="flex:1; min-width:0">
          <div style="display:flex; gap:6px; align-items:center; flex-wrap:wrap; margin-bottom:4px">
            <span class="pill pill-${safe(r.severity)}">${safe(r.severity)}</span>
            <span class="pill pill-${safe(r.status)}">${safe(r.status)}</span>
            <span class="meta">v${safe(r.app_version)} • ${ts}</span>
          </div>
          <div class="msg-line">${safe(summary)}</div>
        </div>
      </div>
      <div class="card-body">
        ${r.url ? `<div><strong>URL:</strong> <a href="${safe(r.url)}" target="_blank" rel="noreferrer">${safe(r.url)}</a></div>` : ''}
        ${r.user_agent ? `<div style="margin-top:6px"><strong>User agent:</strong> <span class="meta">${safe(r.user_agent)}</span></div>` : ''}
        ${r.user_id ? `<div style="margin-top:6px"><strong>User:</strong> <code>${safe(r.user_id)}</code></div>` : ''}
        <div style="margin-top:8px"><strong>Message:</strong></div>
        <pre>${safe(r.message)}</pre>
        <div class="row-actions">
          <select onchange="updateBugStatus('${safe(r.id)}', this.value)">
            <option value="open" ${r.status === 'open' ? 'selected' : ''}>open</option>
            <option value="investigating" ${r.status === 'investigating' ? 'selected' : ''}>investigating</option>
            <option value="resolved" ${r.status === 'resolved' ? 'selected' : ''}>resolved</option>
            <option value="dismissed" ${r.status === 'dismissed' ? 'selected' : ''}>dismissed</option>
          </select>
          <button onclick="copyDiagnostic('${safe(r.id)}')">Copy diagnostic</button>
        </div>
      </div>
    </div>
  `
}

async function updateBugStatus(id, status) {
  try {
    await callApi({ op: 'bug-update', method: 'POST', body: { id, status } })
    loadBugReports()
    loadSummary()
  } catch (err) {
    alert(`Update failed: ${err.message}`)
  }
}

function copyDiagnostic(id) {
  const card = document.querySelector(`.card[data-id="${id}"]`)
  if (!card) return
  navigator.clipboard.writeText(card.innerText).then(() => {
    // Brief visual ack
    const original = card.style.outline
    card.style.outline = '2px solid var(--brand)'
    setTimeout(() => { card.style.outline = original }, 600)
  })
}

document.getElementById('filterStatus').addEventListener('change', loadBugReports)
document.getElementById('filterSeverity').addEventListener('change', loadBugReports)

// ─── AI usage ──────────────────────────────────────────────────────────────
async function loadAIUsage() {
  const container = document.getElementById('aiContent')
  container.innerHTML = '<div class="empty">Loading…</div>'
  try {
    const data = await callApi({ op: 'ai-usage' })
    const r = data.result ?? {}
    container.innerHTML = `
      <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px">
        <div>
          <div class="ai-label">Total cost (30d)</div>
          <div class="ai-num">$${(r.total_cost_usd ?? 0).toFixed(2)}</div>
        </div>
        <div>
          <div class="ai-label">Total calls (30d)</div>
          <div class="ai-num">${r.total_calls ?? 0}</div>
        </div>
        <div>
          <div class="ai-label">Active users (30d)</div>
          <div class="ai-num">${r.unique_users ?? 0}</div>
        </div>
      </div>
      <details style="margin-top:24px">
        <summary style="cursor:pointer; color: var(--ink-mute); font-size:12px">Raw JSON</summary>
        <pre style="margin-top:12px">${JSON.stringify(data, null, 2)}</pre>
      </details>
    `
  } catch (err) {
    container.innerHTML = `<div class="empty" style="color:var(--crash)">Error: ${err.message}</div>`
  }
}

// ─── Boot ──────────────────────────────────────────────────────────────────
loadSummary()
loadBugReports()
</script>
</body>
</html>
